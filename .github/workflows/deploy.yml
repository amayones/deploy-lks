name: Deploy

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy
    uses: appleboy/ssh-action@v1.2.0
    with:
      host: ${{ secrets.HOST }}
      username: ec2-user
      key: ${{ secrets.SSH_KEY }}
      script: |
        cd ~/lks-cloud-computing-2026
        git pull origin main
        npm install
        pm2 restart all
```
